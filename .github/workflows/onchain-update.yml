name: Weekly Onchain Data Update

on:
  schedule:
    - cron: '0 3 * * 1'  # 毎週月曜 UTC 3:00 (JST 12:00)
  workflow_dispatch: {}

jobs:
  onchain-update:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Install site dependencies
        run: cd site && npm ci

      - name: Collect onchain data
        run: npm run onchain
        env:
          QUICKNODE_RPC_URL: ${{ secrets.QUICKNODE_RPC_URL }}

      - name: Build site
        run: npm run site:build

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/onchain/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: weekly onchain data update $(date +%Y-%m-%d)"
            git pull --rebase origin master
            git push
          fi
